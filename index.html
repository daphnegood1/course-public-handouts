<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>公開課程講義</title>
  <style>
    :root {
      --ink: #1b2430;
      --muted: #637181;
      --paper: #fbfaf7;
      --panel: #ffffff;
      --line: #d8dee6;
      --accent: #0b7a75;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.7;
    }
    header {
      background: #10212a;
      color: white;
      padding: 56px 24px;
    }
    main, .wrap {
      width: min(960px, calc(100% - 40px));
      margin: 0 auto;
    }
    h1 {
      font-size: clamp(34px, 5vw, 54px);
      margin: 0 0 12px;
      line-height: 1.15;
    }
    .lead {
      color: #d8e4e7;
      font-size: 20px;
      margin: 0;
      max-width: 720px;
    }
    main {
      padding: 36px 0 70px;
    }
    .card {
      display: block;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      color: inherit;
      text-decoration: none;
      margin-bottom: 16px;
    }
    .card:hover {
      border-color: var(--accent);
    }
    .kicker {
      color: var(--accent);
      font-weight: 800;
      font-size: 14px;
      margin-bottom: 8px;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 26px;
    }
    p { margin: 0; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>公開課程講義</h1>
      <p class="lead">給學生閱讀、下載與課前準備使用的公開教材。</p>
    </div>
  </header>
  <main>
    <a class="card" href="handouts/electronics-codex/">
      <div class="kicker">公開版講義</div>
      <h2>大學生電子學初學者的 Codex 入門公開講義</h2>
      <p>用 Codex 協助整理電子學題目、實驗紀錄、筆記與小工具。內含網頁版、Markdown 與 PowerPoint。</p>
    </a>
  </main>
</body>
</html>
